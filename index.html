<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%logo.png" />
    <!-- viewport-fit=cover : sur Android 15 (targetSdk 35) le WebView est forcé
         edge-to-edge (dessine SOUS la barre de statut). Sans cover, env(safe-area-
         inset-*) reste à 0 → le header de l'app passe sous l'heure/batterie. Avec
         cover, --safe-top/--safe-bottom reflètent les barres système. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Umbra — Vos contenus. Tous vos écrans.</title>
    <meta name="description" content="Umbra : une seule app de streaming pour téléphone, ordinateur et TV. Sans publicité, avec favoris, historique et reprise synchronisés à la seconde." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iptvax.com" />
    <meta property="og:title" content="Umbra — Vos contenus. Tous vos écrans." />
    <meta property="og:description" content="Une seule app de streaming pour téléphone, ordinateur et TV. Sans publicité, sync cross-device." />
    <meta property="og:image" content="https://iptvax.com/logo.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Umbra — Vos contenus. Tous vos écrans." />
    <meta name="twitter:description" content="Téléphone, ordinateur, TV — une seule app de streaming, sync à la seconde." />
    <meta name="twitter:image" content="https://iptvax.com/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- TMDB : ouvre DNS+TLS vers l'API et le CDN d'images en amont du premier
         fetch (tendances + backdrop du hero) → le hero TMDB de l'accueil
         s'affiche plus tôt. dns-prefetch en repli pour les navigateurs qui
         ignorent preconnect cross-origin sans ressource attachée. -->
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <!-- Lumière / Halo doré : duo Instrument Serif (display cinéma/éditorial) +
         Hanken Grotesk (UI ultra-lisible) pour le shell app re-skiné. Inter +
         JetBrains Mono conservés pour le site vitrine (système Vanta inchangé). -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
