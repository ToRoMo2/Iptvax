<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="moonGradient" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFF5D6"/>
      <stop offset="15%" stop-color="#F0D070"/>
      <stop offset="45%" stop-color="#C8951E"/>
      <stop offset="100%" stop-color="#7A5A08"/>
    </radialGradient>
    <clipPath id="outerClip">
      <circle cx="256" cy="256" r="238"/>
    </clipPath>
  </defs>
  <!-- Border ring -->
  <circle cx="256" cy="256" r="252" fill="#1C1410"/>
  <!-- Black fill -->
  <circle cx="256" cy="256" r="238" fill="#0A0A0A"/>
  <!-- Golden moon body -->
  <circle cx="218" cy="256" r="188" fill="url(#moonGradient)" clip-path="url(#outerClip)"/>
  <!-- Shadow circle to carve the crescent -->
  <circle cx="300" cy="248" r="162" fill="#0A0A0A" clip-path="url(#outerClip)"/>
</svg>
