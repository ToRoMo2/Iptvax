apply plugin: 'com.android.application'

// Signature release : lue depuis `android/key.properties` (non commité). Absent
// → on build sans signingConfig (debug uniquement). Présent → l'APK release est
// signé avec le keystore. Voir docs/native-port.md.
def keystorePropsFile = rootProject.file("key.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

android {
    namespace "com.umbra.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.umbra.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Media3 cœur est pur Java (pas de .so). L'extension FFmpeg (audio Dolby,
        // optionnelle) ship en revanche des binaires natifs par ABI → on limite
        // aux ABIs utiles (téléphones + box Android TV) pour ne pas gonfler l'APK.
        // Pour un build release multi-APK, préférer `splits { abi { ... } }`.
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropsFile.exists()) {
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropsFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    // Lecteur natif AndroidX Media3 / ExoPlayer (voir docs/native-port.md).
    // Remplace libVLC : ExoPlayer émet les cues sous-titres en direct (onCues)
    // → rendu dans l'overlay React (restyle instantané, comme mpv sur desktop).
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-exoplayer-hls:$media3Version"
    implementation "androidx.media3:media3-datasource:$media3Version"
    implementation "androidx.media3:media3-common:$media3Version"
    // media3-ui : uniquement pour SubtitleView, qui rend nativement les
    // sous-titres IMAGE (PGS/VobSub/DVB) — impossibles à convertir en cues
    // texte React. Les sous-titres TEXTE restent rendus en React (restyle
    // instantané). Voir MediaPlayerPlugin.emitCues / rebuildTrackRefs.
    implementation "androidx.media3:media3-ui:$media3Version"
    // ⚠ AUDIO DOLBY (AC3/EAC3/DTS) : ExoPlayer s'appuie sur les décodeurs
    // matériels de l'appareil. Beaucoup de téléphones n'ont PAS de décodeur
    // Dolby → ces pistes seraient muettes. Pour couvrir ces codecs il faut
    // l'extension FFmpeg de Media3, qui n'existe PAS en artefact Maven et doit
    // être COMPILÉE depuis les sources avec le NDK (même version $media3Version).
    // Une fois buildée et placée comme module Gradle local, décommenter :
    //   implementation project(':media3-decoder-ffmpeg')
    // Le RenderersFactory est déjà en mode EXTENSION_PREFER (MediaPlayerPlugin).
    // Procédure détaillée : docs/native-port.md (section « Extension FFmpeg »).
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
